name: Tailscale VM + RDP
on:
  workflow_dispatch:
    inputs:
      ts_key:
        description: 'Tailscale Auth Key'
        required: true
      webhook:
        description: 'Discord Webhook URL'
        required: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 330
    steps:
      - name: Setup Sistema
        shell: powershell
        run: |
          Set-Timezone -Name "E. South America Standard Time"
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "RDP-Tailscale" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow -Profile Any

      - name: Instalar Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList '/i ts.msi /quiet /norestart' -Wait

      - name: Autenticar Tailscale
        shell: powershell
        env:
          TS_KEY: ${{ github.event.inputs.ts_key }}
        run: |
          Start-Sleep -Seconds 10
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey="$env:TS_KEY" --hostname="runner-vm"

      - name: Set Admin Password
        shell: powershell
        run: |
          net user Administrator Funnybunny123 /active:yes
          net user Administrator Funnybunny123
          net user runneradmin Funnybunny123 /active:yes
          net user runneradmin Funnybunny123
          net user VMAdmin Funnybunny123 /add
          net localgroup Administradores VMAdmin /add
          net localgroup "Administrators" VMAdmin /add
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4 2>$null
          Write-Output "IP: $ip"

      - name: Notificar Discord
        if: github.event.inputs.webhook != ''
        shell: powershell
        env:
          WEBHOOK: ${{ github.event.inputs.webhook }}
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4 2>$null
          $name = $env:COMPUTERNAME
          $json = @"
          {
            "embeds": [{
              "title": "VM Pronta!",
              "color": 3066993,
              "fields": [
                { "name": "IP", "value": "$ip", "inline": true },
                { "name": "Usuario", "value": "VMAdmin", "inline": true },
                { "name": "Senha", "value": "Funnybunny123", "inline": false },
                { "name": "Workflow", "value": "[Abrir](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
              ]
            }]
          }
          "@
          Invoke-RestMethod -Uri $env:WEBHOOK -Method POST -Body $json -ContentType "application/json"

      - name: Keep Alive
        shell: powershell
        run: |
          $i = 0
          while($i -lt 330) {
            Start-Sleep -Seconds 60
            $i++
            if ($i % 15 -eq 0) { Write-Output "Ativo ha $i minutos..." }
          }
