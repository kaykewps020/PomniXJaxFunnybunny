name: Bore SSH Tunnel
on:
  workflow_dispatch:
    inputs:
      webhook:
        description: 'Discord Webhook URL'
        required: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 330
    steps:
      - name: Setup Sistema
        shell: powershell
        run: |
          Set-Timezone -Name "E. South America Standard Time"
          Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Instalar OpenSSH Server
        shell: powershell
        run: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'
          New-NetFirewallRule -DisplayName "SSH" -Direction Inbound -Protocol TCP -LocalPort 22 -Action Allow
          net user Administrator Funnybunny123 /active:yes
          net user Administrator Funnybunny123

      - name: Instalar Bore
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path "bore.zip" -DestinationPath "C:\bore" -Force
          Write-Output "Bore instalado em C:\bore"

      - name: Iniciar Bore Tunnel
        shell: powershell
        run: |
          $name = $env:COMPUTERNAME
          $runId = "${{ github.run_id }}"
          
          # Inicia bore em background e captura a saída
          $logFile = "$env:TEMP\bore.log"
          $job = Start-Job -ScriptBlock {
            param($n, $id, $log)
            & "C:\bore\bore.exe" local 22 --to bore.pub --port 0 2>&1 | Out-File -FilePath $log -Encoding UTF8
          } -ArgumentList $name, $runId, $logFile
          
          Start-Sleep -Seconds 5
          
          # Espera até achar a porta ou timeout de 15s
          $port = $null
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 1
            if (Test-Path $logFile) {
              $content = Get-Content $logFile -Raw
              if ($content -match 'listening on ([\d.]+):(\d+)') {
                $server = $matches[1]
                $port = $matches[2]
                break
              }
              if ($content -match 'port (\d+)') {
                $port = $matches[1]
                break
              }
            }
          }
          
          if (-not $port) { $port = "2200" }
          $hostVal = "bore.pub"
          
          Write-Output "=========================================="
          Write-Output "VM PRONTA! CONECTE VIA SSH:"
          Write-Output "  ssh Administrator@$hostVal -p $port"
          Write-Output "  Senha: Funnybunny123"
          Write-Output "=========================================="
          
          $hostVal | Out-File -FilePath "$env:TEMP\bore_host.txt"
          $port | Out-File -FilePath "$env:TEMP\bore_port.txt"
          Write-Output "Bore rodando em background"

      - name: Notificar Discord
        if: github.event.inputs.webhook != ''
        shell: powershell
        env:
          WEBHOOK: ${{ github.event.inputs.webhook }}
        run: |
          $hostVal = Get-Content "$env:TEMP\bore_host.txt" -ErrorAction SilentlyContinue
          $portVal = Get-Content "$env:TEMP\bore_port.txt" -ErrorAction SilentlyContinue
          if (-not $hostVal) { $hostVal = "bore.pub" }
          if (-not $portVal) { $portVal = "2200" }
          
          $json = @"
          {
            "embeds": [{
              "title": "VM SSH Pronta!",
              "color": 3066993,
              "fields": [
                { "name": "SSH Command", "value": "ssh Administrator@$hostVal -p $portVal", "inline": false },
                { "name": "Host", "value": "$hostVal", "inline": true },
                { "name": "Porta", "value": "$portVal", "inline": true },
                { "name": "Usuario", "value": "Administrator", "inline": true },
                { "name": "Senha", "value": "Funnybunny123", "inline": true },
                { "name": "Workflow", "value": "[Abrir](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
              ]
            }]
          }
          "@
          Invoke-RestMethod -Uri $env:WEBHOOK -Method POST -Body $json -ContentType "application/json"

      - name: Keep Alive
        shell: powershell
        run: |
          $i = 0
          while($i -lt 330) {
            Start-Sleep -Seconds 60
            $i++
            if ($i % 15 -eq 0) { Write-Output "Ativo ha $i minutos..." }
          }
