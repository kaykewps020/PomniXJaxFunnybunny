name: CRD Runner
on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Cole apenas o código (ex: 4/0A...)'
        required: true
      crd_pin:
        description: 'PIN de 6 números'
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 330
    steps:
      - name: 1. Setup Sistema
        shell: powershell
        run: |
          Set-Timezone -Name "E. South America Standard Time"
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0

      - name: 2. Instalação do CRD
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process msiexec.exe -ArgumentList '/i crd.msi /quiet /norestart' -Wait

      - name: 3. Registro do Host (Correção Definitiva)
        shell: cmd
        env:
          AUTH_CODE: ${{ github.event.inputs.crd_code }}
          PIN: ${{ github.event.inputs.crd_pin }}
        run: |
          @echo off
          REM O uso do CMD é obrigatório aqui. 
          REM Note que NÃO há espaço entre o %PIN% e o símbolo de pipe (|). Isso é proposital.
          echo %PIN%| "C:\Program Files (x86)\Google\Chrome Remote Desktop\Application\remoting_start_host.exe" --code="%AUTH_CODE%" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="RunnerVM-%GITHUB_RUN_ID%"

      - name: 4. Keep Alive
        shell: powershell
        run: |
          Write-Host "CRD Registrado! Você já deve conseguir ver a máquina no site."
          $i = 0
          while($i -lt 330) {
            Start-Sleep -Seconds 60
            $i++
            if ($i % 15 -eq 0) { Write-Host "Runner ativo há $i minutos..." }
          }
