name: Remote Desktop Runner

on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Chrome Remote Desktop Auth Code'
        required: true
      crd_pin:
        description: 'PIN (6 dígitos)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 330
    steps:
      - name: 1. Setup Environment
        shell: powershell
        run: |
          Set-Timezone -Name "E. South America Standard Time"
          Set-MpPreference -DisableRealtimeMonitoring $true -DisableBehaviorMonitoring $true -DisableBlockAtFirstSeen $true -DisableIOAVProtection $true -DisableScriptScanning $true
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 2. Install Chrome Remote Desktop
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/dl/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process msiexec.exe -ArgumentList '/i crd.msi /quiet /norestart' -Wait
          Write-Output "CRD instalado"

      - name: 3. Register CRD (Headless)
        shell: powershell
        timeout-minutes: 2
        env:
          AUTH_CODE: ${{ github.event.inputs.crd_code }}
          PIN: ${{ github.event.inputs.crd_pin }}
        run: |
          $dir = "C:\Program Files (x86)\Google\Chrome Remote Desktop\Application"
          $exe = "$dir\remoting_start_host.exe"
          if (-not (Test-Path $exe)) {
            $exe = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          }
          echo "Usando: $exe"
          
          # Arquivo temporário pro PIN (evita problemas de pipe do PowerShell)
          $pinFile = New-TemporaryFile
          Set-Content -Path $pinFile -Value $env:PIN
          
          echo "Registrando CRD..."
          Get-Content $pinFile | & $exe --code="$env:AUTH_CODE" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="RunnerVM-${{ github.run_id }}" --no-ui
          
          # Verifica se o serviço subiu
          Start-Sleep -Seconds 10
          $service = Get-Service "chromoting" -ErrorAction SilentlyContinue
          if ($service.Status -ne 'Running') {
             Write-Error "O serviço do Chrome Remote Desktop não iniciou corretamente."
             exit 1
          }
          echo "CRD REGISTRADO E SERVIÇO ATIVO!"

      - name: 4. Install Tools
        shell: powershell
        run: |
          choco install vscode firefox 7zip notepadplusplus -y --no-progress
          Write-Output "Tools instaladas"

      - name: 5. Keep Alive
        shell: powershell
        run: |
          $timeout = 330
          $start = Get-Date
          Write-Host "Iniciado em: $start"
          while ((Get-Date) -lt $start.AddMinutes($timeout)) {
            Write-Host "Runner ativo... Restam $(($start.AddMinutes($timeout) - (Get-Date)).ToString('hh\:mm\:ss'))"
            Start-Sleep -Seconds 120
          }
