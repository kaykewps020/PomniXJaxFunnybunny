name: Tailscale VM + RDP
on:
  workflow_dispatch:
    inputs:
      ts_key:
        description: 'Tailscale Auth Key (tskey-auth-...)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 330
    steps:
      - name: 1. Setup Sistema
        shell: powershell
        run: |
          Set-Timezone -Name "E. South America Standard Time"
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Libera RDP em qualquer perfil (inclusive Tailscale)
          New-NetFirewallRule -DisplayName "RDP-Tailscale" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow -Profile Any

      - name: 2. Instalar Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList '/i ts.msi /quiet /norestart' -Wait
          Write-Output "Tailscale instalado!"

      - name: 3. Autenticar Tailscale
        shell: powershell
        env:
          TS_KEY: ${{ github.event.inputs.ts_key }}
        run: |
          # Aguarda o serviço iniciar
          Start-Sleep -Seconds 10
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey="$env:TS_KEY" --hostname="runner-vm"
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Output "=========================================="
          Write-Output "TAILSCALE IP: $ip"
          Write-Output "Conecte via RDP: $ip"
          Write-Output "Usuario: Administrator"
          Write-Output "=========================================="

      - name: 4. Set Admin Password
        shell: powershell
        run: |
          # Lista todos os usuários locais
          Get-LocalUser | Select-Object Name, Enabled, PrincipalSource | Write-Output
          
          # Acha o usuário admin correto
          $admin = Get-LocalUser | Where-Object { $_.PrincipalSource -eq "Local" -and $_.Enabled -eq $true } | Select-Object -First 1
          if (-not $admin) { $admin = Get-LocalUser "Administrator" -ErrorAction SilentlyContinue }
          if (-not $admin) { $admin = Get-LocalUser "runneradmin" -ErrorAction SilentlyContinue }
          if (-not $admin) { $admin = Get-LocalUser "Admin" -ErrorAction SilentlyContinue }
          
          if ($admin) {
            # Habilita se estiver desabilitado
            if (-not $admin.Enabled) { Enable-LocalUser -Name $admin.Name }
            
            $password = ConvertTo-SecureString "Funnybunny123" -AsPlainText -Force
            Set-LocalUser -Name $admin.Name -Password $password -PasswordNeverExpires $true
            Write-Output "=========================================="
            Write-Output "SENHA DO USUARIO '$($admin.Name)' = Funnybunny123"
            Write-Output "=========================================="
          } else {
            # Cria um novo usuário admin
            $password = ConvertTo-SecureString "Funnybunny123" -AsPlainText -Force
            New-LocalUser -Name "Admin" -Password $password -FullName "Administrator" -PasswordNeverExpires $true
            Add-LocalGroupMember -SID "S-1-5-32-544" -Member "Admin"
            Write-Output "=========================================="
            Write-Output "USUARIO 'Admin' CRIADO - Senha: Funnybunny123"
            Write-Output "=========================================="
          }

      - name: 6. Keep Alive
        shell: powershell
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Output "VM ativa em $ip"
          $i = 0
          while($i -lt 330) {
            Start-Sleep -Seconds 60
            $i++
            if ($i % 15 -eq 0) { 
              $status = & "C:\Program Files\Tailscale\tailscale.exe" status --json | ConvertFrom-Json
              Write-Output "Runner ativo há $i minutos - IP: $($status.Self.DNSName)"
            }
          }
